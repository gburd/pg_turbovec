# Codeberg Woodpecker CI for pg_turbovec.
#
# Three pipelines: pure-Rust unit tests (fast, every push), pgrx build
# under several Postgres majors (slower), and a clippy lint sweep.

when:
  - event: [push, pull_request, manual]

steps:
  unit-tests:
    image: rust:1.85-bookworm
    commands:
      - rustup component add rustfmt clippy
      - cargo fmt --all -- --check
      - cargo test --no-default-features --lib
      - cargo test --no-default-features --bench distance --no-run

  clippy:
    image: rust:1.85-bookworm
    commands:
      - rustup component add clippy
      - cargo clippy --no-default-features --lib --tests -- -D warnings

  pgrx-build-pg17:
    image: rust:1.85-bookworm
    commands:
      - apt-get update -y
      - apt-get install -y libreadline-dev zlib1g-dev libssl-dev
                          bison flex pkg-config curl ca-certificates
                          libclang-dev clang
      - cargo install --locked cargo-pgrx --version 0.17.0
      - cargo pgrx init --pg17 download
      - cargo build --features pg17 --no-default-features
    when:
      - event: [push, manual]
        branch: [main, release/*]

  pgrx-test-pg17:
    image: rust:1.85-bookworm
    commands:
      - apt-get update -y
      - apt-get install -y libreadline-dev zlib1g-dev libssl-dev
                          bison flex pkg-config curl ca-certificates
                          libclang-dev clang
      - cargo install --locked cargo-pgrx --version 0.17.0
      - cargo pgrx init --pg17 download
      - cargo pgrx test pg17
    when:
      - event: [push, manual]
        branch: [main, release/*]
