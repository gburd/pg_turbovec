# Codeberg Woodpecker CI for pg_turbovec.
#
# Four pipelines, gated by event/branch:
#
# 1. fmt-check       \u2014 every push: `cargo fmt --all -- --check`.
# 2. clippy          \u2014 every push: `cargo clippy -D warnings` on
#                     both feature configurations.
# 3. unit-tests      \u2014 every push: kernel unit tests (no PG) and
#                     bench compile.
# 4. pgrx-test-pg16  \u2014 main + tags: full `cargo pgrx test pg16`
#                     with a real PostgreSQL 16 cluster.
#
# Pinned versions / paths are surfaced as env so they\u2019re easy to bump:
# pgrx 0.17.0, openblas 0.3.30, clang 17.

variables:
  pgrx-version: &pgrx_version "0.17.0"
  rust-image:   &rust_image   "rust:1.85-bookworm"
  apt-pgrx-deps: &apt_pgrx_deps |
    apt-get update -y
    apt-get install -y \
        libreadline-dev zlib1g-dev libssl-dev \
        bison flex pkg-config curl ca-certificates \
        libclang-dev clang libopenblas-dev

when:
  - event: [push, pull_request, manual]

steps:
  fmt-check:
    image: *rust_image
    commands:
      - rustup component add rustfmt
      - cargo fmt --all -- --check

  clippy:
    image: *rust_image
    environment:
      PGRX_VERSION: *pgrx_version
    commands:
      - rustup component add clippy
      - apt-get update -y
      - apt-get install -y libclang-dev clang libopenblas-dev pkg-config
      # Both feature configurations must be lint-clean.
      - cargo clippy --no-default-features --features pg16 --tests -- -D warnings
      - cargo clippy --features pg16 --tests -- -D warnings

  unit-tests:
    image: *rust_image
    commands:
      - apt-get update -y
      - apt-get install -y libclang-dev clang libopenblas-dev pkg-config
      # Kernel-only tests \u2014 fast, no Postgres needed.
      - cargo test --no-default-features --lib
      # Make sure the benches at least compile.
      - cargo bench --bench distance --no-default-features --features pg16 --no-run
      - cargo bench --bench recall   --no-default-features --features pg16 --no-run

  pgrx-test-pg16:
    image: *rust_image
    environment:
      PGRX_VERSION: *pgrx_version
    commands:
      - *apt_pgrx_deps
      - cargo install --locked cargo-pgrx --version $PGRX_VERSION
      - cargo pgrx init --pg16 download
      - cargo pgrx test pg16 --no-default-features --features pg16
      - cargo pgrx test pg16
    when:
      - event: [push, manual, tag]
        branch: [main, "release/*"]
