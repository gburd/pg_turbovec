name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Mirrors .forgejo/workflows/test.yml so the same CI lights up if
# this repo is ever mirrored to a GitHub host. Forgejo is the
# canonical CI; the GitHub copy is best-effort.

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: bash scripts/drift-check.sh

  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        pg: [13, 14, 15, 16, 17, 18]
    steps:
      - uses: actions/checkout@v4
        with:
          # Shallow clone; the test matrix doesn't need tag history
          # the way drift-check does. Reduces rate-limit pressure on
          # repos with lots of history (`actions/checkout@v4` retries
          # internally but a deep clone amplifies each 403).
          fetch-depth: 1

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          # Don't deny warnings; the gburd/turbovec fork carries
          # pre-existing upstream warnings we don't own.
          rustflags: ""

      - name: install build deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
              build-essential pkg-config libssl-dev libreadline-dev zlib1g-dev \
              libicu-dev libxml2-dev libxslt1-dev liblz4-dev libzstd-dev \
              libclang-dev clang \
              flex bison \
              libopenblas-dev gfortran

      - name: install cargo-pgrx
        run: cargo install --locked cargo-pgrx --version 0.17.0

      - uses: actions/cache@v4
        with:
          path: ~/.pgrx
          key: pgrx-pg${{ matrix.pg }}-${{ hashFiles('Cargo.toml', 'Cargo.lock') }}

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-pg${{ matrix.pg }}-${{ hashFiles('Cargo.lock') }}

      - run: cargo pgrx init --pg${{ matrix.pg }} download

      # NOTE: GitHub `ubuntu-latest` runners are AVX2-capable, and
      # turbovec selects its SIMD kernel with a *runtime*
      # `is_x86_feature_detected!` check. So this job always exercises
      # the AVX2 path, never the pre-AVX2 scalar fallback. The
      # scalar fallback (which once shipped a silent wrong-results /
      # duplicate-TID bug) is covered ONLY by turbovec's own upstream
      # `x86_scalar_fallback_tests::scalar_fallback_matches_simd_topk`
      # plus validating turbovec git-rev bumps on a pre-AVX2 host or
      # `qemu-x86_64 -cpu Nehalem`. Compile-time `-C
      # target-feature=-avx2` would NOT force the scalar path at
      # runtime on an AVX2 machine, so we deliberately do not add a
      # job that pretends to. See docs/TESTING.md § (b) and docs/CI.md.
      # The `index_am_recall_floor_{2,3,4}bit` tests run inside the
      # matrix below and guard the scale + distinct-ids gaps that let
      # that bug ship.
      - run: |
          cargo pgrx test pg${{ matrix.pg }} \
              --no-default-features \
              --features "pg${{ matrix.pg }} pg_test"
