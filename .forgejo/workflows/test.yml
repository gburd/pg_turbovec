name: test
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Codeberg Forgejo Actions configuration.
#
# Codeberg's hosted runners impose a 10-minute job runtime cap (see
# https://codeberg.org/actions/meta § "Available runners"), which
# can't fit our `cargo pgrx test pg<N>` matrix — those jobs need
# 7-15 min each and rebuild PG from source on cold cache. So this
# workflow runs ONLY drift-check (which finishes in 3 seconds) on
# Codeberg's smallest hosted runner. The full 6-PG-version test
# matrix lives at .github/workflows/test.yml and runs on the
# GitHub mirror gburd/pg_turbovec.
#
# If you want the full matrix on Codeberg too, register a
# self-hosted runner against the repo via
# `bash scripts/install-forgejo-runner.sh` (see docs/CI.md). That
# runner has no time cap and can pick up jobs labelled `self-hosted`.

jobs:
  drift-check:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # need tag history for the version-vs-tag check
      - name: install bash + grep
        run: apt-get update -qq && apt-get install -y --no-install-recommends bash grep gawk
      - name: drift-check
        run: bash scripts/drift-check.sh
